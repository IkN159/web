{% extends "base.html" %}

{% block content %}
<div class="card card-news shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
        <h1 class="card-title fw-bold mb-3">{{ news.title }}</h1>
        
        <div class="d-flex flex-wrap text-muted small mb-4 gap-3">
            <span><i class="bi bi-calendar3"></i> {% if news.created_date %}
                {{ news.created_date.strftime('%d.%m.%Y %H:%M') }}
            {% else %}
                Дата не указана
            {% endif %}
            </span>
            <span>
                <i class="bi bi-folder"></i> Категория:
                <a href="{{ url_for('category_news', id=news.category.id) }}" class="category-link">
                    {{ news.category.title }}
                </a>
            </span>
        </div>

        <hr>

        <div class="news-content" style="font-size: 1.1rem; line-height: 1.6;">
            {{ news.text|safe }}
        </div>

        <div class="mt-5">
            <a href="{{ url_for('home_page') }}" class="btn btn-outline-secondary">
                <i class="bi bi-house"></i> На главную
            </a>
            <a href="{{ url_for('category_news', id=news.category.id) }}" class="btn btn-outline-primary ms-2">
                <i class="bi bi-folder"></i> Все новости категории
            </a>
        </div>
    </div>
</div>
{% endblock %}
